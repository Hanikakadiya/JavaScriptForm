<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Registration form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="d-flex justify-content-center p-5 form-holder">
        <div class="form-handler d-flex ">
            <div class="Welcome-panel">
                <div class="Banner-Info d-flex flex-column justify-content-center p-5">
                    <h2 class="text-light ">WELCOME <br> BACK!</h2>
                    <p class="text-light">Lorem ipsum dolor, sit amet <br> consectetur adipisicing elit.</p>
                </div>
            </div>
            <div id="Form-box" class="Form-container p-5">
                <form action="#" method="post" id="Registration-form" class="form-floating">
                    <h2 class="text-light text-center pb-4 ">Sign Up</h2>
                    <div class="Form-info ">
                        <div class="Label-row d-flex justify-content-between">
                            <label for="UName" name="UName" class="text-light form-floating">username </label>
                        </div>
                        <div class="d-flex align-items-center border-bottom mb-1">
                            <input type="text" id="UName-text" class="border-0 bg-transparent text-light w-100 pb-1 ">
                            <i class="fa fa-user text-light " aria-hidden="true"></i>
                        </div>
                        <p id="nameErr" class="text-danger fw-bold m-0 pb-2 error-msg"></p>

                        <div class="Label-row d-flex justify-content-between">
                            <label for="Email-id" name="Email" class="text-light">Email </label>
                        </div>
                        <div class="d-flex align-items-center border-bottom mb-1">
                            <input type="email" id="Email-id" class="border-0 bg-transparent text-light w-100 pb-1">
                            <i class="fa fa-envelope  text-light" aria-hidden="true"></i>
                        </div>
                        <p id="emailErr" class="text-danger fw-bold m-0 pb-2 error-msg"></p>

                        <div class="Label-row d-flex justify-content-between mb-1">
                            <label for="pwd-id" class="text-light">Password</label>
                        </div>
                        <div class="d-flex align-items-center border-bottom mb-1">
                            <input type="password" id="pwd-id" class="border-0 bg-transparent text-light w-100 pb-1"
                                style="outline: none;">

                            <i class="fa fa-lock text-light" aria-hidden="true"></i>

                        </div>
                        <p id="passErr" class="text-danger fw-bold m-0 mb-3" style="font-size: 13px;"></p>

                        <div class="Label-row d-flex justify-content-between">
                            <label for="cpwd-id" name="cpwd" class="text-light">Conform Password </label>
                        </div>
                        <div class="d-flex align-items-center border-bottom mb-1">
                            <input type="password" id="cpwd-id" class="border-0 bg-transparent text-light w-100 pb-1">
                            <i class="fa fa-lock text-light" aria-hidden="true"></i>
                        </div>
                        <p id="confirmErr" class="text-danger fw-bold m-0 pb-2 error-msg"></p>

                    </div>

                    <button type="submit" class="text-light rounded-pill  border-0 p-2 m-4">Sign Up</button>

                </form>
                <div class="Text-center">
                    <p class=" text-light">Already have an account?
                        <a href="login.html" class="login-link">Login</a>

                    </p>
                </div>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
