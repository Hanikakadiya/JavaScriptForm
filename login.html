<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="d-flex justify-content-center p-5 form-holder">
        <div class="form-handler-login d-flex ">
            <div id="Form-box" class="Form-container p-5">
                <form action="#" method="get" id="Login-form" class="form-floating">
                    <h2 class="text-light text-center p-5">Login</h2>
                    <div class="Form-info ">
                        <div class="Label-row d-flex justify-content-between">
                            <label for="UName" name="UName" class="text-light form-floating">username </label>
                        </div>
                        <div class="d-flex align-items-center border-bottom mb-1">
                            <input type="text" id="UName-text" class="border-0 bg-transparent text-light w-100 pb-1 ">
                            <i class="fa fa-user text-light " aria-hidden="true"></i>
                        </div>
                        <p id="nameErr" class="text-danger fw-bold m-0 pb-2 error-msg"></p>



                        <div class="Label-row d-flex justify-content-between">
                            <label for="pwd-id" name="pwd" class="text-light">Password </label>
                        </div>
                        <div class="d-flex align-items-center border-bottom mb-1">

                            <input type="password" id="pwd-id" class="border-0 bg-transparent text-light w-100 pb-1  ">

                            <i class="fa fa-lock text-light" aria-hidden="true"></i>
                        </div>

                        <p id="passErr" class="text-danger fw-bold m-0 pb-2 error-msg"></p>



                    </div>

                    <button type="submit" class="text-light rounded-pill  border-0 p-2 m-4">Login</button>

                </form>
                <div class="Text-center">
                    <p class=" text-light">dont have an account?
                        <a href="index.html" class="login-link">Sign Up</a>

                    </p>
                </div>
            </div>
            <div class="Welcome-panel-login  ">
                <div class="Banner-Info-login d-flex flex-column  justify-content-center p-5 ">
                    <h2 class="text-light  ">WELCOME <br> BACK!</h2>
                    <p class="text-light">Lorem ipsum dolor, sit amet <br> consectetur adipisicing elit.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const loginForm = document.getElementById('Login-form');

        // --- LOGIN VALIDATION ---
        loginForm.addEventListener("submit", function (event) {
            // Stop the form from refreshing the page
            event.preventDefault();

            // 1. Get error boxes
            const nameErr = document.getElementById("nameErr");
            const passErr = document.getElementById("passErr");

            // 2. Clear old errors
            nameErr.textContent = "";
            passErr.textContent = "";

            // 3. Get input values
            const typedUsername = document.getElementById("UName-text").value.trim();
            const typedPassword = document.getElementById("pwd-id").value;

            // 4. Get the saved data from the Registration page
            const realUsername = localStorage.getItem("savedUsername");
            const realPassword = localStorage.getItem("savedPassword");

            // 5. Validation Flag
            let isValid = true;

            // 6. Check for empty fields
            if (typedUsername === "") {
                nameErr.textContent = "Please enter your username!";
                isValid = false;
            }

            if (typedPassword === "") {
                passErr.textContent = "Please enter your password!";
                isValid = false;
            }

            // 7. Check if Credentials match the database
            if (isValid === true) {
                if (realUsername === null) {
                    nameErr.textContent = "No account found! Please sign up first.";
                } else if (typedUsername === realUsername && typedPassword === realPassword) {
                    alert("Login Successful! Welcome back, " + realUsername + "!");
                } else {
                    passErr.textContent = "Incorrect username or password.";
                }
            }
        });


    </script>

</body>

</html>
